name: Run LLM on GitHub

on:
  workflow_dispatch:

jobs:
  run-llm:
    runs-on: ubuntu-latest
    steps:
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve &
          # 等待服务启动
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/10)"
            sleep 3
          done

      - name: Pull model
        run: ollama pull qwen:0.5b

      - name: Run prompt and save output
        run: |
          ollama run qwen:0.5b "你好，简单介绍一下自己" > output.txt 2>&1
          cat output.txt
